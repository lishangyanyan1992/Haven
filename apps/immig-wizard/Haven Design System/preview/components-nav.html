<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--neutral-50); font-family: var(--font-body); padding: 24px; display: flex; flex-direction: column; gap: 20px; }

/* Top nav */
.topnav { background: var(--neutral-0); border: 1px solid var(--neutral-200); border-radius: 12px; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-xs); }
.nav-logo { display: flex; align-items: center; gap: 10px; }
.nav-logo .icon { width: 28px; height: 28px; }
.nav-logo .wordmark { font-family: var(--font-display); font-size: 20px; font-weight: 300; color: var(--neutral-900); }
.nav-links { display: flex; gap: 4px; }
.nav-link { font-size: 14px; font-weight: 400; color: var(--neutral-600); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 150ms; }
.nav-link:hover { color: var(--neutral-900); background: var(--neutral-50); }
.nav-link.active { color: var(--green-700); background: var(--green-50); font-weight: 500; }
.nav-actions { display: flex; gap: 8px; }
.btn-sm { font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer; }

/* Sidebar nav */
.sidebar { background: var(--neutral-0); border: 1px solid var(--neutral-200); border-radius: 12px; width: 200px; padding: 16px 12px; box-shadow: var(--shadow-xs); display: flex; flex-direction: column; gap: 2px; }
.sidebar-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px; font-size: 13px; font-weight: 400; color: var(--neutral-600); cursor: pointer; transition: all 150ms; }
.sidebar-item:hover { background: var(--neutral-50); color: var(--neutral-900); }
.sidebar-item.active { background: var(--green-50); color: var(--green-700); font-weight: 500; }
.sidebar-item svg { flex-shrink: 0; opacity: 0.7; }
.sidebar-item.active svg { opacity: 1; }
.sidebar-divider { height: 1px; background: var(--neutral-100); margin: 8px 4px; }
.sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--neutral-400); padding: 6px 10px 4px; }
</style></head><body>

<div class="topnav">
  <div class="nav-logo">
    <svg class="icon" viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 6 L6 24 L6 52 L58 52 L58 24 Z" stroke="#1E5241" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
      <path d="M21 52 L21 40 Q21 33 32 33 Q43 33 43 40 L43 52" stroke="#1E5241" stroke-width="2" stroke-linecap="round" fill="none"/>
      <line x1="10" y1="24" x2="54" y2="24" stroke="#C98928" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="wordmark">Haven</span>
  </div>
  <div class="nav-links">
    <span class="nav-link active">Dashboard</span>
    <span class="nav-link">Documents</span>
    <span class="nav-link">Timeline</span>
    <span class="nav-link">Team</span>
  </div>
  <div class="nav-actions">
    <button class="btn-sm" style="background:var(--neutral-50);color:var(--neutral-700);border:1.5px solid var(--neutral-300)">Log in</button>
    <button class="btn-sm" style="background:var(--green-600);color:#fff;border:none">Get started</button>
  </div>
</div>

<div style="display:flex;gap:16px">
  <div class="sidebar">
    <div class="sidebar-label">My Case</div>
    <div class="sidebar-item active">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Overview
    </div>
    <div class="sidebar-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Documents
    </div>
    <div class="sidebar-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Timeline
    </div>
    <div class="sidebar-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Deadlines
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Support</div>
    <div class="sidebar-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </div>
  </div>
</div>
</body></html>
