<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--neutral-25); font-family: var(--font-body); padding: 20px 24px; }
.grid { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.token { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
.bar { background: var(--green-500); border-radius: 2px; width: 28px; }
.name { font-family: var(--font-mono); font-size: 9px; color: var(--neutral-500); }
.val { font-size: 9px; color: var(--neutral-400); }
</style></head><body>
<div class="grid">
  <div class="token"><div class="bar" style="height:4px"></div><div class="name">space-1</div><div class="val">4px</div></div>
  <div class="token"><div class="bar" style="height:8px"></div><div class="name">space-2</div><div class="val">8px</div></div>
  <div class="token"><div class="bar" style="height:12px"></div><div class="name">space-3</div><div class="val">12px</div></div>
  <div class="token"><div class="bar" style="height:16px"></div><div class="name">space-4</div><div class="val">16px</div></div>
  <div class="token"><div class="bar" style="height:20px"></div><div class="name">space-5</div><div class="val">20px</div></div>
  <div class="token"><div class="bar" style="height:24px"></div><div class="name">space-6</div><div class="val">24px</div></div>
  <div class="token"><div class="bar" style="height:32px"></div><div class="name">space-8</div><div class="val">32px</div></div>
  <div class="token"><div class="bar" style="height:40px"></div><div class="name">space-10</div><div class="val">40px</div></div>
  <div class="token"><div class="bar" style="height:48px"></div><div class="name">space-12</div><div class="val">48px</div></div>
  <div class="token"><div class="bar" style="height:64px"></div><div class="name">space-16</div><div class="val">64px</div></div>
  <div class="token"><div class="bar" style="height:80px"></div><div class="name">space-20</div><div class="val">80px</div></div>
  <div class="token"><div class="bar" style="height:96px"></div><div class="name">space-24</div><div class="val">96px</div></div>
</div>
</body></html>
