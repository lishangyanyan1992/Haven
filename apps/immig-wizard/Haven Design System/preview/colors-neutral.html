<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--neutral-25); font-family: var(--font-body); padding: 20px; }
.row { display: flex; gap: 2px; border-radius: 10px; overflow: hidden; border: 1px solid var(--neutral-200); }
.swatch { flex: 1; height: 64px; display: flex; align-items: flex-end; padding: 6px 8px; }
.swatch span { font-size: 10px; font-weight: 500; line-height: 1.2; }
.label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--neutral-500); text-transform: uppercase; margin-bottom: 8px; }
</style></head><body>
<div class="label">Warm Neutrals</div>
<div class="row">
  <div class="swatch" style="background:var(--neutral-0)"><span style="color:#9e968a">0</span></div>
  <div class="swatch" style="background:var(--neutral-25)"><span style="color:#9e968a">25</span></div>
  <div class="swatch" style="background:var(--neutral-50)"><span style="color:#7d7570">50</span></div>
  <div class="swatch" style="background:var(--neutral-100)"><span style="color:#5e5750">100</span></div>
  <div class="swatch" style="background:var(--neutral-200)"><span style="color:#403b35">200</span></div>
  <div class="swatch" style="background:var(--neutral-300)"><span style="color:#2a2520">300</span></div>
  <div class="swatch" style="background:var(--neutral-400)"><span style="color:#fff">400</span></div>
  <div class="swatch" style="background:var(--neutral-500)"><span style="color:#ece9e2">500</span></div>
  <div class="swatch" style="background:var(--neutral-600)"><span style="color:#d8d3c9">600</span></div>
  <div class="swatch" style="background:var(--neutral-700)"><span style="color:#bfb8ab">700</span></div>
  <div class="swatch" style="background:var(--neutral-800)"><span style="color:#9e968a">800</span></div>
  <div class="swatch" style="background:var(--neutral-900)"><span style="color:#7d7570">900</span></div>
</div>
</body></html>
