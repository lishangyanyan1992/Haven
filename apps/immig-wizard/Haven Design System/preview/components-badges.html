<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--neutral-50); font-family: var(--font-body); padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--neutral-400); width: 80px; flex-shrink: 0; }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; border: 1px solid; }
.step-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--neutral-0); border: 1.5px solid var(--neutral-200); border-radius: 9999px; padding: 6px 14px 6px 6px; font-size: 13px; font-weight: 500; color: var(--neutral-700); box-shadow: var(--shadow-xs); }
.step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--green-600); color: #fff; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div class="row"><div class="label">Status</div>
  <span class="badge" style="background:var(--success-light);color:var(--success-dark)"><span class="dot" style="background:var(--success)"></span>Approved</span>
  <span class="badge" style="background:var(--warning-light);color:var(--warning-dark)"><span class="dot" style="background:var(--warning)"></span>In Progress</span>
  <span class="badge" style="background:var(--error-light);color:var(--error-dark)"><span class="dot" style="background:var(--error)"></span>Action Required</span>
  <span class="badge" style="background:var(--info-light);color:var(--info-dark)"><span class="dot" style="background:var(--info)"></span>Under Review</span>
  <span class="badge" style="background:var(--neutral-100);color:var(--neutral-600)"><span class="dot" style="background:var(--neutral-400)"></span>Not Started</span>
</div>
<div class="row"><div class="label">Visa type</div>
  <span class="tag" style="background:var(--green-50);border-color:var(--green-200);color:var(--green-700)">H-1B</span>
  <span class="tag" style="background:var(--green-50);border-color:var(--green-200);color:var(--green-700)">F-1/OPT</span>
  <span class="tag" style="background:var(--green-50);border-color:var(--green-200);color:var(--green-700)">EB-2</span>
  <span class="tag" style="background:var(--green-50);border-color:var(--green-200);color:var(--green-700)">EB-3</span>
  <span class="tag" style="background:var(--amber-50);border-color:var(--amber-200);color:var(--amber-700)">O-1</span>
  <span class="tag" style="background:var(--amber-50);border-color:var(--amber-200);color:var(--amber-700)">L-1</span>
</div>
<div class="row"><div class="label">Progress</div>
  <div class="step-badge"><span class="step-num">1</span>File I-140</div>
  <div class="step-badge"><span class="step-num" style="background:var(--neutral-300)">2</span>Wait for priority date</div>
  <div class="step-badge"><span class="step-num" style="background:var(--success)">✓</span>Receive receipt</div>
</div>
</body></html>
