<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--neutral-25); font-family: var(--font-body); padding: 20px; }
.row { display: flex; gap: 2px; border-radius: 10px; overflow: hidden; }
.swatch { flex: 1; height: 64px; display: flex; align-items: flex-end; padding: 6px 8px; }
.swatch span { font-size: 10px; font-weight: 500; line-height: 1.2; }
.label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--neutral-500); text-transform: uppercase; margin-bottom: 8px; margin-top: 16px; }
.label:first-child { margin-top: 0; }
</style></head><body>
<div class="label">Primary — Forest Green</div>
<div class="row">
  <div class="swatch" style="background:var(--green-50)"><span style="color:#2a6e56">50</span></div>
  <div class="swatch" style="background:var(--green-100)"><span style="color:#163c30">100</span></div>
  <div class="swatch" style="background:var(--green-200)"><span style="color:#0f2a21">200</span></div>
  <div class="swatch" style="background:var(--green-300)"><span style="color:#0f2a21">300</span></div>
  <div class="swatch" style="background:var(--green-400)"><span style="color:#fff">400</span></div>
  <div class="swatch" style="background:var(--green-500)"><span style="color:#fff">500</span></div>
  <div class="swatch" style="background:var(--green-600)"><span style="color:#d9e8e0">600 ●</span></div>
  <div class="swatch" style="background:var(--green-700)"><span style="color:#b3d1c2">700</span></div>
  <div class="swatch" style="background:var(--green-800)"><span style="color:#80b39d">800</span></div>
  <div class="swatch" style="background:var(--green-900)"><span style="color:#4d9077">900</span></div>
</div>
<div class="label">Accent — Warm Amber</div>
<div class="row">
  <div class="swatch" style="background:var(--amber-50)"><span style="color:#a66e1e">50</span></div>
  <div class="swatch" style="background:var(--amber-100)"><span style="color:#7d5216">100</span></div>
  <div class="swatch" style="background:var(--amber-200)"><span style="color:#55370e">200</span></div>
  <div class="swatch" style="background:var(--amber-300)"><span style="color:#2e1e07">300</span></div>
  <div class="swatch" style="background:var(--amber-400)"><span style="color:#fff">400</span></div>
  <div class="swatch" style="background:var(--amber-500)"><span style="color:#fff">500 ●</span></div>
  <div class="swatch" style="background:var(--amber-600)"><span style="color:#f8ead0">600</span></div>
  <div class="swatch" style="background:var(--amber-700)"><span style="color:#f0d49f">700</span></div>
  <div class="swatch" style="background:var(--amber-800)"><span style="color:#e5b96b">800</span></div>
  <div class="swatch" style="background:var(--amber-900)"><span style="color:#d9a040">900</span></div>
</div>
</body></html>
