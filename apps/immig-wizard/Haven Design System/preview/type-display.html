<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--neutral-25); font-family: var(--font-display); padding: 20px 24px; }
.row { padding: 2px 0; border-bottom: 1px solid var(--neutral-100); display: flex; align-items: baseline; gap: 16px; }
.row:last-child { border: none; }
.meta { font-family: var(--font-body); font-size: 10px; color: var(--neutral-400); width: 80px; flex-shrink: 0; }
</style></head><body>
<div class="row">
  <span class="meta">72px · 300</span>
  <span style="font-size:72px;font-weight:300;color:var(--neutral-900);line-height:1">Your path forward.</span>
</div>
<div class="row">
  <span class="meta">48px · 300</span>
  <span style="font-size:48px;font-weight:300;color:var(--neutral-900);line-height:1.1">Your H-1B is in good hands.</span>
</div>
<div class="row">
  <span class="meta">36px · 400</span>
  <span style="font-size:36px;font-weight:400;color:var(--neutral-800);line-height:1.2">Navigate your visa journey with clarity.</span>
</div>
<div class="row">
  <span class="meta">30px · 400</span>
  <span style="font-size:30px;font-weight:400;color:var(--neutral-800);font-style:italic">Let's figure out your next step.</span>
</div>
<div class="row">
  <span class="meta">24px · 500</span>
  <span style="font-size:24px;font-weight:500;color:var(--neutral-700)">Employment-based green cards made simple.</span>
</div>
</body></html>
