name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check & lint
    runs-on: ubuntu-latest

    env:
      # Stub Supabase vars so env validation doesn't throw at import time.
      # No real secrets are needed for type checking or linting.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (haven)
        run: npm run typecheck:haven

      - name: Type check (immig-wizard)
        run: npm run typecheck:wizard
