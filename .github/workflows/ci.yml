name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (haven)
        run: npm run typecheck:haven
        env:
          # Provide stub env vars so the type checker can resolve modules
          # that reference process.env — no real secrets needed here.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Type check (immig-wizard)
        run: npm run typecheck:wizard
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Lint (haven)
        run: npm run --workspace @haven/app lint

      - name: Audit dependencies
        run: npm audit --audit-level=critical
