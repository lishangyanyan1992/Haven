name: Dependency audit

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "apps/**/package.json"
      - "packages/**/package.json"
      - ".github/workflows/dependency-audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "apps/**/package.json"
      - "packages/**/package.json"
      - ".github/workflows/dependency-audit.yml"
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Critical vulnerability audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Audit dependencies
        run: npm audit --audit-level=critical
