version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    groups:
      npm-security:
        applies-to: "security-updates"
        patterns:
          - "*"
      npm-non-major:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "America/Chicago"
    groups:
      github-actions:
        patterns:
          - "*"
